<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="startScreen" class="screen active">

<img src="logo.png" class="logo">

<h1>Math City</h1>

<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="resetGame()">♻ איפוס</button>
<button onclick="checkUpdate()">⬆ עדכון גרסה</button>

</div>


<div id="gameScreen" class="screen">

<header>

<img src="logo.png" class="logoSmall">

<h2>Math City</h2>

</header>


<div class="topBar">

<div>רמה <span id="level">1</span></div>
<div>⭐ נקודות <span id="score">0</span></div>
<div>🪙 מטבעות <span id="coins">0</span></div>

</div>


<div class="buttonBar">

<button onclick="openShop()">🏪 חנות</button>
<button onclick="spinWheel()">🎰 גלגל מזל</button>
<button onclick="checkUpdate()">⬆ עדכון</button>
<button onclick="resetGame()">♻ איפוס</button>

</div>


<div class="questionBox">

<div class="qRow">

<span id="q1"></span>

<input id="a1">

<button onclick="checkAnswer(1)">בדוק</button>

</div>


<div class="qRow">

<span id="q2"></span>

<input id="a2">

<button onclick="checkAnswer(2)">בדוק</button>

</div>

</div>


<div id="city" class="city"></div>

<div id="rewardPopup"></div>

</div>



<div id="shopScreen" class="screen">

<h2>🏪 חנות</h2>

<div id="shopList" class="shopGrid"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>


<footer>

© 2026 אלכסיי זבודיסקר | גרסה <span id="versionText">5.2</span>

</footer>

<script src="game.js"></script>

</body>
</html>
