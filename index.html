<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<br>

<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="resetGame()">♻️ איפוס</button>
<button onclick="checkUpdate()">🔄 עדכון גרסה</button>

</div>

<div id="gameScreen" class="screen">

<header>

<h2>Math City</h2>

<img src="logo.png" class="logoSmall">

</header>

<div class="statsBar">

רמה <span id="level">1</span> |
⭐ <span id="score">0</span> |
🪙 <span id="coins">0</span>

</div>

<div class="buttonsBar">

<button onclick="openShop()">🏪</button>
<button onclick="openRewards()">🎁</button>
<button onclick="openCharacters()">👦</button>
<button onclick="openStats()">📊</button>
<button onclick="spinWheel()">🎰</button>

</div>

<div id="monster"></div>

<h2 id="question"></h2>

<input id="answer">

<br>

<button id="checkBtn" onclick="check()">בדיקה</button>

<div id="city" class="city"></div>

</div>

<div id="shopScreen" class="screen">

<h2>חנות</h2>

<div id="shopList"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<div id="charactersScreen" class="screen">

<h2>דמויות</h2>

<div id="charactersList"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<div id="statsScreen" class="screen">

<h2>סטטיסטיקות</h2>

<div id="statsBox"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<footer>

גרסה <span id="versionText"></span>  
© 2026 אלכסיי זבודיסקר

</footer>

<script src="game.js"></script>

</body>
</html>
