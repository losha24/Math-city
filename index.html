<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City 1.0.2</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
background:#4CAF50;
color:white;
padding:15px;
}

header img{
width:120px;
display:block;
margin:auto;
}

#menu button{
margin:5px;
padding:10px 18px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

#menu button.active{
background:#e53935;
}

#game{
display:none;
padding:20px;
}

#topbar{
background:#e3f2fd;
padding:10px;
margin-bottom:15px;
font-weight:bold;
}

.exercise{
margin:10px;
}

.exercise input{
width:60px;
padding:6px;
font-size:18px;
text-align:center;
}

.correct{
background:#c8e6c9;
}

.wrong{
background:#ffcdd2;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

#check{
margin-top:10px;
padding:10px 25px;
font-size:16px;
background:#2196F3;
border:none;
color:white;
border-radius:6px;
}

footer{
margin-top:30px;
padding:10px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Math City</h1>

<div id="menu">
<button onclick="startGame()">התחלת משחק</button>
<button onclick="resetGame()">איפוס</button>
<button onclick="updateGame()">עדכון</button>
</div>

</header>

<div id="game">

<div id="topbar">
⭐ רמה: <span id="level">1</span> |
🧮 נקודות: <span id="points">0</span> |
💰 מטבעות: <span id="coins">0</span>
</div>

<div id="exercises"></div>

<button id="check" onclick="checkAnswers()">בדיקה</button>

</div>

<footer>
© Math City – Version 1.0.2
</footer>

<script>

let coins=0
let points=0
let level=1
let correctCount=0

let exercises=[]

function save(){
localStorage.setItem("mathCoins",coins)
localStorage.setItem("mathPoints",points)
localStorage.setItem("mathLevel",level)
}

function load(){
coins=parseInt(localStorage.getItem("mathCoins"))||0
points=parseInt(localStorage.getItem("mathPoints"))||0
level=parseInt(localStorage.getItem("mathLevel"))||1
updateBar()
}

function updateBar(){
document.getElementById("coins").textContent=coins
document.getElementById("points").textContent=points
document.getElementById("level").textContent=level
}

function startGame(){
document.getElementById("game").style.display="block"
generateExercises()
}

function resetGame(){
localStorage.clear()
location.reload()
}

function updateGame(){
location.reload()
}

function difficulty(){
if(points<10)return 10
if(points<30)return 20
if(points<60)return 50
return 100
}

function generateExercises(){

let max=difficulty()
exercises=[]

let container=document.getElementById("exercises")
container.innerHTML=""

for(let i=0;i<3;i++){

let a=Math.floor(Math.random()*max)+1
let b=Math.floor(Math.random()*max)+1

let op=Math.random()<0.6?"+":"-"

let answer=op==="+"?a+b:a-b

exercises.push(answer)

let div=document.createElement("div")
div.className="exercise"

div.innerHTML=`
${a} ${op} ${b} =
<input id="ans${i}">
`

container.appendChild(div)

}

}

function checkAnswers(){

for(let i=0;i<3;i++){

let input=document.getElementById("ans"+i)
let val=parseInt(input.value)

if(val===exercises[i]){

input.classList.remove("wrong")
input.classList.add("correct")

coins+=2
points+=1
correctCount++

if(correctCount%5===0)level++

generateExercises()

}else{

input.classList.remove("correct")
input.classList.add("wrong")

}

}

updateBar()
save()

}

load()

</script>

</body>
</html>
