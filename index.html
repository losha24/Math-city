<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#eef5ff;
margin:0;
display:flex;
justify-content:center;
}

.app{
max-width:420px;
width:100%;
text-align:center;
}

header{
background:#4CAF50;
color:white;
padding:6px;
}

.logo{
width:140px;
}

.screen{display:none;}
.active{display:block;}

.city{
display:grid;
grid-template-columns:repeat(5,60px);
gap:8px;
justify-content:center;
margin:20px;
font-size:30px;
}

button{
padding:10px;
margin:4px;
border:none;
border-radius:8px;
background:#2196F3;
color:white;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.shopGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
}

.shopItem{
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.correct{
background:#b8f5b8;
border:2px solid green;
}

.wrong{
background:#ffb3b3;
border:2px solid red;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.reward{
background:linear-gradient(45deg,#ffeb3b,#ff9800);
padding:10px;
border-radius:10px;
margin:10px;
}

.monster{
font-size:35px;
}

footer{
margin-top:20px;
font-size:14px;
}

</style>
</head>

<body>

<div class="app">

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<br><br>

<button onclick="startGame()">🎮 התחל משחק</button>

<br>

<button onclick="openShop()">🏪 חנות</button>
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>

</div>

<div id="gameScreen" class="screen">

<header>

Math City

<br>

<img src="logo.png" class="logo">

</header>

<h3>

רמה: <span id="level">1</span>
⭐ נקודות: <span id="score">0</span>
🪙 מטבעות: <span id="coins">0</span>

</h3>

<div class="controls">

<button onclick="openShop()">🏪 חנות</button>
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
<button onclick="addGift()">👨‍👩‍👧 הוסף מתנה</button>
<button onclick="updateVersion()">🔄 עדכן גרסה</button>
<button onclick="resetGame()">♻️ איפוס</button>

</div>

<div id="monster" class="monster"></div>

<div id="rewardBox"></div>

<h2 id="question"></h2>

<input id="answer">

<br><br>

<button id="checkBtn" onclick="check()">בדוק</button>

<div id="city" class="city"></div>

</div>

<footer>

© 2026 אלכסיי זבודיסקר

</footer>

</div>

<script>

let level=1
let score=0
let coins=0
let attempts=0
let correct=0

let solved=0
let mistakes=0

let rewards=[]

let buildings=["🏠","🌳","🏪","🏫","🎡","🏢"]

let shopItems=[
{name:"🚗 מכונית",price:50,icon:"🚗"},
{name:"🌳 עץ",price:40,icon:"🌳"},
{name:"🏠 בית גדול",price:80,icon:"🏠"},
{name:"🏪 קניון",price:120,icon:"🏪"},
{name:"🏫 בית ספר",price:150,icon:"🏫"}
]

function startGame(){
showScreen("gameScreen")
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function newQuestion(){

attempts=0

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correct=a+b

question.innerText=a+" + "+b

}

function check(){

let val=parseInt(answer.value)

let btn=document.getElementById("checkBtn")

if(val==correct){

btn.style.background="green"

score++
coins+=5
solved++

build()

}else{

btn.style.background="red"

attempts++
mistakes++

answer.classList.add("wrong")

}

updateUI()

setTimeout(()=>{
btn.style.background="#2196F3"
answer.value=""
answer.classList.remove("wrong")
newQuestion()
},600)

}

function build(){

let el=document.createElement("div")

el.innerText=buildings[Math.floor(Math.random()*buildings.length)]

city.appendChild(el)

}

function updateUI(){

score.innerText=score
level.innerText=level
coins.innerText=coins

}

function addGift(){

let name=prompt("שם מתנה")
let icon=prompt("אייקון")
let price=parseInt(prompt("מחיר"))

if(name){

shopItems.push({name,icon,price})

}

}

function updateVersion(){

location.reload(true)

}

function resetGame(){

localStorage.clear()

location.reload()

}

newQuestion()

</script>

</body>
</html>
