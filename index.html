<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Math City 1.0.2</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#4CAF50;
color:white;
padding:15px;
}

header img{
width:160px;
display:block;
margin:auto;
}

.menu button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

.menu button.active{
background:#e53935;
}

#game{
display:none;
padding:20px;
}

#topbar{
background:#e3f2fd;
padding:10px;
font-weight:bold;
margin-bottom:15px;
}

.exercise{
margin:10px;
font-size:20px;
}

.exercise input{
width:70px;
padding:6px;
font-size:18px;
text-align:center;
}

.correct{
background:#c8e6c9;
}

.wrong{
background:#ffcdd2;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

#check{
padding:10px 30px;
background:#2196F3;
border:none;
color:white;
border-radius:6px;
font-size:16px;
}

.shop{
display:none;
margin-top:20px;
}

.shop-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.item{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.2);
}

.buy{
margin-top:5px;
padding:5px;
border:none;
border-radius:4px;
color:white;
}

.buy.green{background:#4CAF50}
.buy.red{background:#e53935}

#stats{
display:none;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

footer{
margin-top:20px;
padding:10px;
color:#666;
}

</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Math City</h1>

<div class="menu">

<button onclick="startGame()">התחלת משחק</button>
<button onclick="toggleShop(this)">חנות</button>
<button onclick="toggleStats(this)">סטטיסטיקה</button>
<button onclick="dailyReward()">פרס יומי</button>
<button onclick="spinWheel()">גלגל מזל</button>
<button onclick="resetGame()">איפוס</button>
<button onclick="location.reload()">עדכון</button>

</div>

</header>

<div id="game">

<div id="topbar">
⭐ רמה <span id="level">1</span> |
🧮 נקודות <span id="points">0</span> |
💰 מטבעות <span id="coins">0</span>
</div>

<div id="exercises"></div>

<button id="check" onclick="checkAnswers()">בדיקה</button>

<div class="shop" id="shop">
<h3>חנות</h3>
<div class="shop-grid" id="shopGrid"></div>
</div>

<div id="stats">
<h3>סטטיסטיקה</h3>
<table>
<tr>
<th>פריט</th>
<th>מחיר</th>
</tr>
<tbody id="statsBody"></tbody>
</table>
</div>

</div>

<footer>
© Math City – Version 1.0.2
</footer>

<script>

let coins=0
let points=0
let level=1
let correct=0
let exercises=[]

let shopItems=[
{name:"🎁 פרס",price:20},
{name:"🎮 משחק",price:30},
{name:"🚗 מכונית",price:25},
{name:"⚽ כדור",price:15},
{name:"🎯 חץ",price:18},
{name:"🎲 קוביה",price:12},
{name:"🧸 דובי",price:22},
{name:"🚀 טיל",price:35},
{name:"🎨 צבעים",price:17}
]

function save(){
localStorage.setItem("coins",coins)
localStorage.setItem("points",points)
localStorage.setItem("level",level)
}

function load(){
coins=parseInt(localStorage.getItem("coins"))||0
points=parseInt(localStorage.getItem("points"))||0
level=parseInt(localStorage.getItem("level"))||1
updateBar()
}

function updateBar(){
coins=Math.max(0,coins)
document.getElementById("coins").textContent=coins
document.getElementById("points").textContent=points
document.getElementById("level").textContent=level
}

function startGame(){
document.getElementById("game").style.display="block"
generateExercises()
renderShop()
}

function resetGame(){
localStorage.clear()
location.reload()
}

function difficulty(){
if(points<10)return 10
if(points<30)return 20
if(points<60)return 50
return 100
}

function generateExercises(){

let max=difficulty()
exercises=[]

let box=document.getElementById("exercises")
box.innerHTML=""

for(let i=0;i<3;i++){

let a=Math.floor(Math.random()*max)+1
let b=Math.floor(Math.random()*max)+1
let op=Math.random()<0.5?"+":"-"

let ans=op=="+"?a+b:a-b

exercises.push(ans)

box.innerHTML+=`
<div class="exercise">
${a} ${op} ${b} =
<input id="ans${i}">
</div>
`

}

}

function checkAnswers(){

for(let i=0;i<3;i++){

let input=document.getElementById("ans"+i)
let val=parseInt(input.value)

if(isNaN(val))continue

if(val===exercises[i]){

input.classList.remove("wrong")
input.classList.add("correct")

coins+=2
points++
correct++

generateExercises()
break

}else{

input.classList.remove("correct")
input.classList.add("wrong")

}

}

if(correct%10===0)level++

updateBar()
save()

}

function renderShop(){

let grid=document.getElementById("shopGrid")
grid.innerHTML=""

shopItems.forEach(i=>{

let can=coins>=i.price

grid.innerHTML+=`
<div class="item">
${i.name}<br>
${i.price} 💰<br>
<button class="buy ${can?"green":"red"}"
onclick="buyItem('${i.name}',${i.price})">
קניה
</button>
</div>
`

})

}

function buyItem(name,price){

if(coins<price)return

coins-=price
updateBar()

let row=document.createElement("tr")
row.innerHTML=`<td>${name}</td><td>${price}</td>`
document.getElementById("statsBody").appendChild(row)

renderShop()
save()

}

function toggleShop(btn){

let box=document.getElementById("shop")

if(box.style.display=="block"){
box.style.display="none"
btn.classList.remove("active")
}else{
box.style.display="block"
btn.classList.add("active")
}

}

function toggleStats(btn){

let box=document.getElementById("stats")

if(box.style.display=="block"){
box.style.display="none"
btn.classList.remove("active")
}else{
box.style.display="block"
btn.classList.add("active")
}

}

function dailyReward(){

let last=localStorage.getItem("daily")

let now=Date.now()

if(last && now-last<28800000){
alert("כבר קיבלת פרס היום")
return
}

coins+=10
updateBar()

localStorage.setItem("daily",now)
save()

alert("קיבלת 10 מטבעות 🎁")

}

function spinWheel(){

if(correct<15){
alert("צריך 15 תשובות נכונות")
return
}

let prize=Math.floor(Math.random()*3)

if(prize==0)coins+=10
if(prize==1)coins+=20
if(prize==2)points+=5

updateBar()
save()

alert("זכית בפרס 🎡")

}

load()

</script>

</body>
</html>
