<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City 1.0.2</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f0f0; }
    #header { background:#4CAF50; text-align:center; padding:10px 0; position:relative; }
    #header img { width:150px; display:block; margin:0 auto; }
    #header h1 { color:white; margin:5px 0 0 0; font-size:2em; }
    #main { padding:20px; display:none; }
    .btn { padding:10px 20px; margin:5px; cursor:pointer; border:none; color:white; border-radius:5px; }
    .green { background:#4CAF50; }
    .red { background:#f44336; }
    #exercise { margin-bottom:20px; }
    .exercise-box { display:inline-block; width:45%; margin:2%; vertical-align:top; }
    .exercise-box input { width:100%; padding:5px; font-size:1em; text-align:center; }
    #check-btn { display:block; margin:20px auto; background:#2196F3; }
    #shop, #stats, #prizes { display:none; border:1px solid #ccc; background:white; padding:10px; margin-top:10px; }
    .shop-item { display:flex; justify-content:space-between; margin-bottom:5px; }
    .shop-item img { width:40px; }
    #reward-msg { margin-top:10px; font-weight:bold; }
    .shake { animation: shake 0.5s; }
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
    }
</style>
</head>
<body>

<div id="header">
    <img src="logo.png" alt="Logo">
    <h1>Math City</h1>
    <div id="intro-buttons">
        <button class="btn green" id="start-btn">התחלת משחק</button>
        <button class="btn green" id="reset-btn">איפוס</button>
        <button class="btn green" id="update-btn">עדכון גרסה</button>
    </div>
</div>

<div id="main">
    <div id="exercise">
        <div class="exercise-box">
            <div>תרגיל 1: <span class="question">5+3</span></div>
            <input type="number" class="answer">
        </div>
        <div class="exercise-box">
            <div>תרגיל 2: <span class="question">2+7</span></div>
            <input type="number" class="answer">
        </div>
        <div class="exercise-box">
            <div>תרגיל 3: <span class="question">6+4</span></div>
            <input type="number" class="answer">
        </div>
        <div class="exercise-box">
            <div>תרגיל 4: <span class="question">3+8</span></div>
            <input type="number" class="answer">
        </div>
        <button class="btn" id="check-btn">בדיקה</button>
        <div id="reward-msg"></div>
    </div>

    <button class="btn green" id="shop-btn">חנות</button>
    <div id="shop">
        <div id="parent-controls" style="display:none;">
            <button class="btn green" id="add-item-btn">הוספת פריט</button>
        </div>
        <div id="shop-items"></div>
    </div>

    <button class="btn green" id="stats-btn">סטטיסטיקה</button>
    <div id="stats">
        <table border="1" width="100%">
            <thead>
                <tr><th>פריט</th><th>מחיר</th><th>אייקון</th></tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>

    <button class="btn green" id="prizes-btn">פרסים</button>
    <div id="prizes"></div>
</div>

<script>
let exercises = [
    {q:"5+3", a:8},
    {q:"2+7", a:9},
    {q:"6+4", a:10},
    {q:"3+8", a:11}
];

let answersCorrect = 0;
let totalCorrect = 0;
let rewardCooldown = 0;

function shuffleExercises() {
    exercises.sort(()=>Math.random()-0.5);
    let boxes = document.querySelectorAll(".exercise-box");
    boxes.forEach((box,i)=>{
        box.querySelector(".question").textContent = exercises[i].q;
        box.querySelector("input").value="";
        box.querySelector("input").style.backgroundColor="";
    });
}

function checkAnswers() {
    let boxes = document.querySelectorAll(".exercise-box");
    let allAnswered = true;
    boxes.forEach((box,i)=>{
        let val = parseInt(box.querySelector("input").value);
        if(isNaN(val)) allAnswered=false;
    });
    if(!allAnswered) return;

    boxes.forEach((box,i)=>{
        let input = box.querySelector("input");
        if(parseInt(input.value)===exercises[i].a){
            input.style.backgroundColor="lightgreen";
            totalCorrect++;
            answersCorrect++;
            if(answersCorrect>=14 && rewardCooldown===0){
                document.getElementById("reward-msg").textContent="🎁 פרס! קיבלת מתנה";
                rewardCooldown = 1;
            }
            shuffleExercises();
        }else{
            input.style.backgroundColor="salmon";
            input.classList.add("shake");
            setTimeout(()=>input.classList.remove("shake"),500);
        }
    });
    saveState();
}

function saveState(){
    localStorage.setItem("answersCorrect", answersCorrect);
    localStorage.setItem("totalCorrect", totalCorrect);
}

document.getElementById("check-btn").addEventListener("click", checkAnswers);

document.getElementById("start-btn").addEventListener("click", ()=>{
    document.getElementById("main").style.display="block";
    document.getElementById("intro-buttons").style.display="none";
    shuffleExercises();
});

document.getElementById("reset-btn").addEventListener("click", ()=>{
    answersCorrect=0; totalCorrect=0;
    saveState();
    location.reload();
});

document.getElementById("update-btn").addEventListener("click", ()=>{
    alert("בדיקה אם קיימת גרסה חדשה...");
    location.reload();
});
</script>

</body>
</html>
