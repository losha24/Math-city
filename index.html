<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#eef5ff;
margin:0;
display:flex;
justify-content:center;
}

.app{
max-width:420px;
width:100%;
text-align:center;
}

header{
background:#4CAF50;
color:white;
padding:8px;
}

.logo{
width:140px;
}

.screen{
display:none;
}

.active{
display:block;
}

.city{
display:grid;
grid-template-columns:repeat(5,60px);
gap:8px;
justify-content:center;
margin:20px;
font-size:30px;
}

button{
padding:10px;
margin:4px;
font-size:15px;
border-radius:8px;
border:none;
background:#2196F3;
color:white;
}

button.green{
background:#4CAF50;
}

button.red{
background:#e53935;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.shopGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
}

.shopItem{
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
font-size:14px;
}

.correct{
background:#b8f5b8;
border:2px solid green;
}

.wrong{
background:#ffb3b3;
border:2px solid red;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.reward{
background:linear-gradient(45deg,#ffeb3b,#ff9800);
padding:10px;
border-radius:10px;
margin:10px;
}

.monster{
font-size:35px;
}

footer{
margin-top:20px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="app">

<!-- START -->

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<br><br>

<button onclick="startGame()">🎮 התחל משחק</button>

<br>

<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>

</div>

<!-- GAME -->

<div id="gameScreen" class="screen">

<header>

Math City

</header>

<h3>

רמה: <span id="level">1</span>  
⭐ נקודות: <span id="score">0</span>  
🪙 מטבעות: <span id="coins">0</span>

</h3>

<div class="controls">

<button onclick="openRewards()">🏆</button>
<button onclick="openShop()">🏪</button>
<button onclick="openStats()">📊</button>
<button onclick="parentPanel()">👨‍👩‍👧</button>
<button onclick="updateVersion()">🔄</button>
<button onclick="installApp()">📲</button>
<button onclick="resetGame()">♻️</button>

</div>

<div id="monster" class="monster"></div>

<div id="rewardBox"></div>

<h2 id="question"></h2>

<input id="answer">

<br><br>

<button id="checkBtn" onclick="check()">בדוק</button>

<div class="city" id="city"></div>

</div>

<!-- SHOP -->

<div id="shopScreen" class="screen">

<h2>🏪 חנות</h2>

<div id="shopList" class="shopGrid"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<!-- REWARDS -->

<div id="rewardsScreen" class="screen">

<h2>🏆 הפרסים</h2>

<div id="rewardList"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<!-- STATS -->

<div id="statsScreen" class="screen">

<h2>📊 סטטיסטיקות</h2>

<div id="statsBox"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<footer>

© 2026 אלכסיי זבודיסקר

</footer>

</div>

<script>

const VERSION="1.0.0"

fetch("version.json")
.then(r=>r.json())
.then(v=>{
if(v.version!==VERSION){
alert("יש גרסה חדשה זמינה")
}
})

let level=1
let score=0
let coins=0
let attempts=0
let correct=0
let solved=0
let mistakes=0

let rewards=[]

let buildings=["🏠","🌳","🏪","🏫","🎡","🏢"]

let monsters=["👾","👻","🤖","🦖"]

let monsterActive=false

let shopItems=[
{name:"🚗 מכונית",price:50,icon:"🚗"},
{name:"🌳 עץ",price:40,icon:"🌳"},
{name:"🏠 בית גדול",price:80,icon:"🏠"},
{name:"🏪 קניון",price:120,icon:"🏪"},
{name:"🏫 בית ספר",price:150,icon:"🏫"},
{name:"🎡 לונה פארק",price:200,icon:"🎡"}
]

function showScreen(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function startGame(){

showScreen("gameScreen")

}

function backGame(){

showScreen("gameScreen")

}

function openShop(){

renderShop()

showScreen("shopScreen")

}

function openRewards(){

updateRewardList()

showScreen("rewardsScreen")

}

function openStats(){

renderStats()

showScreen("statsScreen")

}

function newQuestion(){

attempts=0

answer.classList.remove("correct","wrong")

let a,b

if(level<3){

a=Math.floor(Math.random()*10)
b=Math.floor(Math.random()*10)

correct=a+b

question.innerText=a+" + "+b

}else{

a=Math.floor(Math.random()*10)
b=Math.floor(Math.random()*a)

correct=a-b

question.innerText=a+" - "+b

}

}

function check(){

let val=parseInt(answer.value)

let btn=document.getElementById("checkBtn")

if(val==correct){

btn.className="green"

answer.className="correct"

score++

coins+=5

build()

updateUI()

setTimeout(()=>{

btn.className=""
answer.value=""

newQuestion()

},500)

}else{

btn.className="red"

answer.className="wrong"

attempts++

if(attempts>=2){

setTimeout(()=>{

answer.value=""

newQuestion()

btn.className=""

},700)

}

}

}

function build(){

let el=document.createElement("div")

el.innerText=buildings[Math.floor(Math.random()*buildings.length)]

city.appendChild(el)

}

function renderShop(){

shopList.innerHTML=""

shopItems.forEach(item=>{

shopList.innerHTML+=`

<div class="shopItem">

${item.icon}<br>

${item.name}

<br>

${item.price} 🪙

<br>

<button onclick="buyItem('${item.icon}',${item.price})">קנה</button>

</div>

`

})

}

function buyItem(icon,price){

if(coins<price){

alert("אין מספיק מטבעות")

return

}

coins-=price

let el=document.createElement("div")

el.innerText=icon

city.appendChild(el)

updateUI()

}

function parentPanel(){

let name=prompt("שם מתנה")
let icon=prompt("אייקון")
let price=parseInt(prompt("מחיר"))

if(name){

shopItems.push({name,icon,price})

}

}

function updateVersion(){

location.reload(true)

}

function renderStats(){

statsBox.innerHTML=

`

פתרת: ${solved}<br>

טעויות: ${mistakes}<br>

מטבעות: ${coins}

`

}

function updateRewardList(){

rewardList.innerHTML=rewards.join(" ")

}

function updateUI(){

score.innerText=score
level.innerText=level
coins.innerText=coins

}

function resetGame(){

localStorage.clear()

location.reload()

}

newQuestion()

</script>

</body>
</html>
