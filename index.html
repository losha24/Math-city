<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<button onclick="startGame()">🎮 התחל לשחק</button>
<button onclick="updateVersion()">🔄 עדכון גרסה</button>
<button onclick="resetGame()">♻️ איפוס</button>

</div>


<div id="gameScreen" class="screen">

<header>

<h2>Math City</h2>

<div class="stats">

רמה: <span id="level">1</span>

⭐ נקודות: <span id="score">0</span>

🪙 מטבעות: <span id="coins">0</span>

</div>

</header>


<div class="buttonBar">

<button onclick="openShop()">🏪</button>
<button onclick="openRewards()">🏆</button>
<button onclick="openStats()">📊</button>
<button onclick="openMap()">🗺</button>
<button onclick="openCharacters()">🧙</button>
<button onclick="spinWheel()">🎡</button>
<button onclick="parentMode()">👨‍👩‍👧</button>
<button onclick="updateVersion()">🔄</button>

</div>


<div id="monster"></div>

<h2 id="question"></h2>

<input id="answer">

<button id="checkBtn" onclick="check()">בדוק</button>

<div id="rewardBox"></div>

<div class="city" id="city"></div>

</div>


<footer>

© 2026 אלכסיי זבודיסקר  
גרסה: <span id="appVersion"></span>

</footer>

<script src="game.js"></script>

</body>
</html>
