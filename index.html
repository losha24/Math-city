<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City 1.0.2</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f0f0; }
#header { background:#4CAF50; text-align:center; padding:10px 0; position:relative; }
#header img { width:200px; display:block; margin:0 auto; }
#header h1 { color:white; margin:5px 0 0 0; font-size:2em; }
#intro-buttons { margin-top:10px; }
.btn { padding:10px 20px; margin:5px; cursor:pointer; border:none; color:white; border-radius:5px; transition:0.3s; }
.green { background:#4CAF50; }
.red { background:#f44336; }
.blue { background:#2196F3; }
#main { padding:20px; display:none; }
#exercise { margin-bottom:20px; }
.exercise-box input { width:100%; padding:5px; font-size:1em; text-align:center; }
#check-btn { display:block; margin:20px auto; background:#2196F3; }
#shop, #stats { display:none; border:1px solid #ccc; background:white; padding:10px; margin-top:10px; }
.shop-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.shop-item img { width:40px; }
#reward-msg { margin-top:10px; font-weight:bold; text-align:center; }
.shake { animation: shake 0.5s; }
@keyframes shake {0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); }}
#footer { text-align:center; padding:10px; background:#ddd; margin-top:20px; }
</style>
</head>
<body>

<div id="header">
    <img src="logo.png" alt="Logo">
    <h1>Math City</h1>
    <div id="intro-buttons">
        <button class="btn green" id="start-btn">התחלת משחק</button>
        <button class="btn green" id="reset-btn">איפוס</button>
        <button class="btn green" id="update-btn">עדכון גרסה</button>
    </div>
</div>

<div id="main">
    <!-- תרגיל אחד -->
    <div id="exercise">
        <div class="exercise-box">
            <div>תרגיל: <span class="question">5+3</span></div>
            <input type="number" class="answer">
        </div>
        <button class="btn blue" id="check-btn">בדיקה</button>
        <div id="reward-msg"></div>
    </div>

    <!-- חנות בסיסית -->
    <button class="btn green" id="shop-btn">חנות</button>
    <div id="shop">
        <div id="shop-items"></div>
    </div>

    <!-- סטטיסטיקה בסיסית -->
    <button class="btn green" id="stats-btn">סטטיסטיקה</button>
    <div id="stats">
        <table border="1" width="100%">
            <thead>
                <tr><th>פריט</th><th>מחיר</th></tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>
</div>

<div id="footer">© 2026 Math City - גרסה 1.0.2</div>

<script>
// ---- משתנים ----
let exercise = {q:"5+3", a:8};
let coins = 0;
let shopItems = [
    {name:"פריט 1", price:10},
    {name:"פריט 2", price:15},
    {name:"פריט 3", price:20},
];

// ---- פונקציות ----
function checkAnswer() {
    let input = document.querySelector(".answer");
    let val = parseInt(input.value);
    if(isNaN(val)) return;
    if(val === exercise.a){
        input.style.backgroundColor="lightgreen";
        coins +=5;
        document.getElementById("reward-msg").textContent="תשובה נכונה! +5 מטבעות";
        newExercise();
    } else {
        input.style.backgroundColor="salmon";
        input.classList.add("shake");
        setTimeout(()=>input.classList.remove("shake"),500);
    }
    saveState();
}

function newExercise(){
    // פשוט מחזיר אותו תרגיל, גרסה בסיסית
    document.querySelector(".answer").value="";
    document.querySelector(".answer").style.backgroundColor="";
}

function renderShop() {
    let container = document.getElementById("shop-items");
    container.innerHTML="";
    shopItems.forEach((item,i)=>{
        let div = document.createElement("div");
        div.className="shop-item";
        let btnBuy = document.createElement("button");
        btnBuy.textContent=`קנה (${item.price})`;
        btnBuy.className = coins>=item.price ? "btn green":"btn red";
        btnBuy.onclick=()=>{
            if(coins>=item.price){
                coins -= item.price;
                updateStats(item);
                saveState();
                renderShop();
            } else alert("אין מספיק כסף");
        };
        div.textContent=item.name;
        div.appendChild(btnBuy);
        container.appendChild(div);
    });
}

function updateStats(item){
    let tbody = document.getElementById("stats-body");
    let row = document.createElement("tr");
    row.innerHTML=`<td>${item.name}</td><td>${item.price}</td>`;
    tbody.appendChild(row);
}

function saveState(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("shopItems", JSON.stringify(shopItems));
}

// ---- אירועים ----
document.getElementById("start-btn").addEventListener("click", ()=>{
    document.getElementById("main").style.display="block";
    document.getElementById("intro-buttons").style.display="none";
});

document.getElementById("reset-btn").addEventListener("click", ()=>{
    coins=0;
    saveState();
    location.reload();
});

document.getElementById("update-btn").addEventListener("click", ()=>{
    alert("בדיקה אם קיימת גרסה חדשה...");
    location.reload();
});

document.getElementById("check-btn").addEventListener("click", checkAnswer);

document.getElementById("shop-btn").addEventListener("click", ()=>{
    let shop = document.getElementById("shop");
    shop.style.display = shop.style.display==="block" ? "none":"block";
});

document.getElementById("stats-btn").addEventListener("click", ()=>{
    let stats = document.getElementById("stats");
    stats.style.display = stats.style.display==="block"?"none":"block";
});

renderShop();
</script>

</body>
</html>
