<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="startScreen" class="screen active">

<h1>Math City</h1>
<img src="logo.png" class="logo">

<button onclick="startGame()">🎮 התחל משחק</button>

</div>


<div id="gameScreen" class="screen">

<header>

<h2>Math City</h2>

</header>

<h3>

רמה: <span id="level">1</span>  
⭐ נקודות: <span id="score">0</span>  
🪙 מטבעות: <span id="coins">0</span>

</h3>


<div class="buttonBar">

<button onclick="openShop()">🏪 חנות</button>
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
<button onclick="spinWheel()">🎡 גלגל מזל</button>
<button onclick="parentMode()">👨‍👩‍👧 הורים</button>
<button onclick="updateVersion()">🔄 עדכון</button>
<button onclick="resetGame()">♻️ איפוס</button>

</div>


<div id="monster" class="monster"></div>

<h2 id="question"></h2>

<input id="answer">

<button onclick="check()">בדוק</button>

<div id="rewardBox"></div>

<div class="city" id="city"></div>

</div>


<div id="shopScreen" class="screen">

<h2>🏪 חנות</h2>

<div id="shopList" class="shopGrid"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>


<div id="statsScreen" class="screen">

<h2>📊 סטטיסטיקות</h2>

<div id="statsBox"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>


<footer>

© 2026 אלכסיי זבודיסקר  
גרסה: <span id="appVersion">4.0</span>

</footer>


<script src="game.js"></script>

</body>
</html>
