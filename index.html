<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- מסך פתיחה -->
<div id="startScreen" class="screen active">
<h1>Math City</h1>
<img src="logo.png" class="logo">
<br><br>
<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
</div>

<!-- מסך משחק -->
<div id="gameScreen" class="screen">
<header>
<h2>Math City</h2>
<img src="logo.png" class="logo">
</header>

<h3>
רמה: <span id="level">1</span>
⭐ נקודות: <span id="score">0</span>
🪙 מטבעות: <span id="coins">0</span>
</h3>

<div id="monster" class="monster"></div>
<div id="rewardBox"></div>

<h2 id="question"></h2>
<input id="answer">
<br><br>
<button id="checkBtn" onclick="check()">בדוק</button>

<div class="city" id="city"></div>

<br>
<div class="buttonsBar">
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
<button onclick="resetGame()">♻️ איפוס</button>
<button id="installBtn">📲 התקן</button>
<button onclick="updateOrRefresh()">🔄 עדכון גרסה</button>
</div>
</div>

<!-- חנות -->
<div id="shopScreen" class="screen">
<h2>🏪 חנות</h2>
<div id="shopList" class="shop"></div>
<div>
<button onclick="toggleParentMode()">👨‍👩‍👧 מצב הורים</button>
</div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<!-- פרסים -->
<div id="rewardsScreen" class="screen">
<h2>🏆 הפרסים</h2>
<div id="rewardList"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<!-- סטטיסטיקות -->
<div id="statsScreen" class="screen">
<h2>📊 סטטיסטיקות</h2>
<div id="statsBox"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<footer>© 2026 אלכסיי זבודיסקר</footer>

<script src="game.js"></script>
<script src="sw.js"></script>
<script src="version.js"></script>
</body>
</html>
