<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#eef5ff;
text-align:center;
margin:0;
}

header{
background:#4CAF50;
color:white;
padding:15px;
}

.logo{
width:180px;
margin-top:10px;
}

.screen{
display:none;
}

.active{
display:block;
}

.city{
display:grid;
grid-template-columns:repeat(5,60px);
gap:8px;
justify-content:center;
margin:20px;
font-size:30px;
}

button{
padding:12px;
margin:8px;
font-size:18px;
border-radius:8px;
border:none;
background:#2196F3;
color:white;
}

.startBtn{
background:#4CAF50;
}

.reward{
font-size:22px;
background:linear-gradient(45deg,#ffeb3b,#ff9800);
padding:10px;
border-radius:10px;
margin:10px;
}

.correct{
background:#b8f5b8;
border:2px solid green;
}

.wrong{
background:#ffb3b3;
border:2px solid red;
}

.monster{
font-size:35px;
margin:10px;
}

footer{
margin-top:30px;
padding:10px;
font-size:14px;
color:#555;
}

.rewardList{
font-size:28px;
}

</style>
</head>

<body>

<!-- START SCREEN -->

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<br>

<button class="startBtn" onclick="startGame()">🎮 התחל משחק</button>

<br>

<button onclick="openRewards()">🏆 פרסים</button>

</div>

<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

<header>

<h2>Math City</h2>

<img src="logo.png" class="logo">

</header>

<h3>

רמה: <span id="level">1</span>  
⭐ נקודות: <span id="score">0</span>

</h3>

<div id="monster" class="monster"></div>

<div id="rewardBox"></div>

<h2 id="question"></h2>

<input id="answer">

<br><br>

<button onclick="check()">בדוק</button>

<div class="city" id="city"></div>

<br>

<button onclick="openRewards()">🏆 פרסים</button>

<button id="installBtn">📲 התקן אפליקציה</button>

<button onclick="updateApp()">🔄 עדכון</button>

<button onclick="resetGame()">♻️ איפוס</button>

</div>

<!-- REWARDS SCREEN -->

<div id="rewardsScreen" class="screen">

<h2>🏆 הפרסים שלך</h2>

<div id="rewardList" class="rewardList"></div>

<br>

<button onclick="backToGame()">⬅ חזרה</button>

</div>

<footer>

© 2026 אלכסיי זבודיסקר

</footer>

<script>

let level=1
let score=0
let correct=0
let attempts=0

let rewards=[]

let buildings=["🏠","🌳","🏪","🏫","🎡","🏢"]

let rewardItems=["🚗","🎡","🏰","🗼","🎢"]

let monsters=["👾","👻","🤖","🦖"]

let monsterActive=false

function startGame(){

showScreen("gameScreen")

}

function openRewards(){

updateRewardList()

showScreen("rewardsScreen")

}

function backToGame(){

showScreen("gameScreen")

}

function showScreen(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function newQuestion(){

answer.classList.remove("correct","wrong")

attempts=0

let a,b

if(level==1){

a=Math.floor(Math.random()*5)

b=Math.floor(Math.random()*5)

correct=a+b

question.innerText=a+" + "+b

}

else if(level==2){

a=Math.floor(Math.random()*10)

b=Math.floor(Math.random()*10)

correct=a+b

question.innerText=a+" + "+b

}

else if(level==3){

a=Math.floor(Math.random()*10)

b=Math.floor(Math.random()*a)

correct=a-b

question.innerText=a+" - "+b

}

else{

a=Math.floor(Math.random()*5)

b=Math.floor(Math.random()*5)

correct=a*b

question.innerText=a+" × "+b

}

}

function spawnMonster(){

monster.innerText=monsters[Math.floor(Math.random()*monsters.length)]

monsterActive=true

}

function check(){

let val=parseInt(answer.value)

if(isNaN(val)) return

if(val==correct){

answer.classList.add("correct")

score++

scoreEl.innerText=score

if(monsterActive){

monster.innerText=""

monsterActive=false

}else{

build()

}

if(score%10==0){

giveReward()

}

if(score%5==0){

level++

levelEl.innerText=level

spawnMonster()

}

setTimeout(()=>{

answer.value=""

newQuestion()

},500)

save()

}else{

attempts++

answer.classList.add("wrong")

if(attempts>=2){

setTimeout(()=>{

answer.value=""

newQuestion()

answer.classList.remove("wrong")

},700)

}

}

}

function build(){

let el=document.createElement("div")

el.innerText=buildings[Math.floor(Math.random()*buildings.length)]

city.appendChild(el)

}

function giveReward(){

let r=rewardItems[Math.floor(Math.random()*rewardItems.length)]

rewards.push(r)

rewardBox.innerHTML='<div class="reward">🎁 פרס חדש '+r+'</div>'

setTimeout(()=>{

rewardBox.innerHTML=""

},3000)

}

function updateRewardList(){

rewardList.innerHTML=""

if(rewards.length==0){

rewardList.innerHTML="עדיין אין פרסים"

return

}

rewards.forEach(r=>{

rewardList.innerHTML+=r+" "

})

}

function save(){

localStorage.setItem("mathCity",

JSON.stringify({

score:score,

level:level,

city:city.innerHTML,

rewards:rewards

}))

}

function load(){

let data=localStorage.getItem("mathCity")

if(data){

let d=JSON.parse(data)

score=d.score||0

level=d.level||1

rewards=d.rewards||[]

scoreEl.innerText=score

levelEl.innerText=level

city.innerHTML=d.city||""

}

}

function resetGame(){

localStorage.clear()

location.reload()

}

function updateApp(){

caches.keys().then(names=>{

for(let name of names)

caches.delete(name)

})

location.reload()

}

let scoreEl=document.getElementById("score")

let levelEl=document.getElementById("level")

load()

newQuestion()

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js')

}

</script>

</body>
</html>
