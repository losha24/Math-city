<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math City</title>
<link rel="stylesheet" href="style.css">
<script defer src="game.js"></script>
</head>
<body>

<div id="startScreen" class="screen active">
    <h1>Math City</h1>
    <img src="logo.png" class="logo">
    <br><br>
    <button class="green-btn" onclick="startGame()">🎮 התחל משחק</button>
    <button class="green-btn" onclick="resetGame()">♻️ איפוס</button>
    <button class="green-btn" onclick="checkUpdate()">⬆️ עדכון גרסה</button>
</div>

<div id="gameScreen" class="screen">
    <header>
        <h2>Math City</h2>
        <img src="logo.png" class="logo">
    </header>

    <div class="status-bar">
        רמה: <span id="level">1</span>  
        ⭐ נקודות: <span id="score">0</span>  
        🪙 מטבעות: <span id="coins">0</span>
        <button class="green-btn" onclick="resetGame()">♻️ איפוס</button>
        <button class="green-btn" onclick="checkUpdate()">⬆️ עדכון גרסה</button>
        <button class="green-btn" onclick="installApp()">📲 התקנת אפליקציה</button>
    </div>

    <h2 id="question"></h2>
    <input id="answer">
    <br>
    <button class="green-btn" onclick="checkAnswer()">בדוק</button>

    <div id="city" class="city"></div>

    <button class="green-btn" onclick="openShop()">🏪 חנות</button>
    <button class="green-btn" onclick="openRewards()">🏆 פרסים</button>
    <button class="green-btn" onclick="openStats()">📊 סטטיסטיקות</button>
    <button class="green-btn" onclick="spinWheel()">🎡 גלגל מזל</button>
</div>

<div id="shopScreen" class="screen">
    <h2>🏪 חנות</h2>
    <div id="shopList"></div>
    <div id="parentControls">
        <h3>🔧 בקרת הורים</h3>
        <input id="newItemName" placeholder="שם פריט">
        <input id="newItemPrice" placeholder="מחיר">
        <input id="newItemIcon" placeholder="אייקון">
        <button class="green-btn" onclick="addShopItem()">➕ הוסף פריט</button>
    </div>
    <button class="green-btn" onclick="backGame()">⬅ חזרה</button>
</div>

<div id="rewardsScreen" class="screen">
    <h2>🏆 הפרסים</h2>
    <div id="rewardList"></div>
    <button class="green-btn" onclick="backGame()">⬅ חזרה</button>
</div>

<div id="statsScreen" class="screen">
    <h2>📊 סטטיסטיקות</h2>
    <div id="statsBox"></div>
    <button class="green-btn" onclick="backGame()">⬅ חזרה</button>
</div>

<footer>
© 2026 אלכסיי זבודיסקר<br>
גרסה נוכחית: <span id="appVersion">3.0</span>
</footer>

</body>
</html>
