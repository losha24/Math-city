<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Math City</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="screen active">
<h1>Math City</h1>
<img src="logo.png" class="logo">
<div class="buttonRow">
<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
<button onclick="openDailyTasks()">📅 משימות יומיות</button>
<button onclick="openMap()">🗺️ מפה</button>
<button onclick="openCharacters()">👥 דמויות</button>
<button onclick="openWheel()">🎡 גלגל מזל</button>
<button onclick="updateVersion()">⬆ עדכון גרסה</button>
<button onclick="parentMode()">👨‍👩‍👧 מצב הורים</button>
</div>
</div>

<div id="gameScreen" class="screen">
<header><h2>Math City</h2><img src="logo.png" class="logo"></header>
<h3>רמה: <span id="level">1</span> ⭐ נקודות: <span id="score">0</span> 🪙 מטבעות: <span id="coins">0</span></h3>
<div id="monster" class="monster"></div>
<div id="rewardBox"></div>
<h2 id="question"></h2>
<input id="answer">
<br><button onclick="check()">בדוק</button>
<div class="city" id="city"></div>
<div class="buttonRow">
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
<button onclick="resetGame()">♻️ איפוס</button>
</div>
</div>

<div id="shopScreen" class="screen">
<h2>🏪 חנות</h2>
<div id="shopList" class="shopGrid"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<div id="rewardsScreen" class="screen">
<h2>🏆 הפרסים</h2>
<div id="rewardList"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<div id="statsScreen" class="screen">
<h2>📊 סטטיסטיקות</h2>
<div id="statsBox"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<div id="dailyTasksScreen" class="screen">
<h2>📅 משימות יומיות</h2>
<div id="tasksList"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<div id="mapScreen" class="screen">
<h2>🗺️ מפה</h2>
<div id="mapContainer"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<div id="charactersScreen" class="screen">
<h2>👥 דמויות</h2>
<div id="charactersList"></div>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<div id="wheelScreen" class="screen">
<h2>🎡 גלגל מזל</h2>
<canvas id="wheelCanvas" width="300" height="300"></canvas>
<br><button onclick="spinWheel()">סובב גלגל מזל</button>
<button onclick="backGame()">⬅ חזרה</button>
</div>

<footer>© 2026 אלכסיי זבודיסקר | גרסה נוכחית: <span id="currentVersion">4.0</span></footer>
<script src="game.js"></script>
</body>
</html>
