<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<div class="startButtons">

<button class="greenBtn" onclick="startGame()">🎮 התחל משחק</button>

<button class="greenBtn" onclick="resetGame()">♻️ איפוס</button>

<button class="greenBtn" onclick="checkUpdate()">🔄 עדכון</button>

</div>

</div>


<div id="gameScreen" class="screen">

<header>

<h2>Math City</h2>

<img src="logo.png" class="logoSmall">

</header>

<div class="topBar">

<div>⭐ נקודות: <span id="score">0</span></div>
<div>🏆 רמה: <span id="level">1</span></div>
<div>🪙 מטבעות: <span id="coins">0</span></div>

</div>


<div id="monster"></div>

<h2 id="question"></h2>

<input id="answer">

<button id="checkBtn" onclick="checkAnswer()">בדוק</button>


<div id="city" class="city"></div>


<div class="buttonBar">

<button class="greenBtn" onclick="openShop()">🏪 חנות</button>

<button class="greenBtn" onclick="openRewards()">🎁 פרסים</button>

<button class="greenBtn" onclick="openCharacters()">🧑 דמויות</button>

<button class="greenBtn" onclick="openStats()">📊 סטטיסטיקות</button>

<button class="greenBtn" onclick="parentMode()">👨‍👩‍👧 הורים</button>

</div>

</div>


<div id="shopScreen" class="screen">

<h2>🏪 חנות</h2>

<div id="shopList" class="shopGrid"></div>

<button class="greenBtn" onclick="backGame()">⬅ חזרה</button>

</div>


<div id="rewardsScreen" class="screen">

<h2>🎁 פרסים</h2>

<div id="rewardList"></div>

<button class="greenBtn" onclick="backGame()">⬅ חזרה</button>

</div>


<div id="charactersScreen" class="screen">

<h2>🧑 דמויות</h2>

<div id="characterList"></div>

<button class="greenBtn" onclick="backGame()">⬅ חזרה</button>

</div>


<div id="statsScreen" class="screen">

<h2>📊 סטטיסטיקות</h2>

<div id="statsBox"></div>

<button class="greenBtn" onclick="backGame()">⬅ חזרה</button>

</div>


<footer>

© 2026 אלכסיי זבודיסקר  
<br>
גרסה: <span id="appVersion">4.2</span>

</footer>

<script src="game.js"></script>

</body>
</html>
