<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>משחק מתמטיקה לילדים</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

header{
background:#2ecc71;
color:white;
padding:15px;
transition:0.3s;
}

header.small{
padding:6px;
font-size:14px;
}

#logo{
font-size:28px;
margin-top:5px;
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.stats{
margin:10px;
font-size:18px;
}

.buttonsBar{
display:flex;
justify-content:center;
gap:6px;
flex-wrap:wrap;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.green{background:#2ecc71;color:white;}
.red{background:#e74c3c;color:white;}
.blue{background:#3498db;color:white;}
.orange{background:#f39c12;color:white;}

#exercise{
font-size:28px;
margin:20px;
}

input{
font-size:20px;
padding:10px;
width:120px;
text-align:center;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.shop{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.gift{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.gift span{
font-size:30px;
display:block;
}

.hidden{display:none}

</style>
</head>

<body>

<header id="topBar">
<div id="logo">🎮 משחק חשבון</div>
</header>

<div class="container">

<div class="stats">
רמה: <span id="level">1</span>
נקודות: <span id="points">0</span>
</div>

<div class="buttonsBar">

<button class="blue" onclick="openShop()">🛍 חנות</button>
<button class="orange" onclick="parentPanel()">👨‍👩‍👧 הורים</button>
<button class="green" onclick="checkUpdate()">🔄 עדכון</button>
<button class="blue" id="installBtn">📲 התקן</button>

</div>

<div id="exercise"></div>

<input id="answer">

<br><br>

<button id="checkBtn" class="blue" onclick="checkAnswer()">בדיקה</button>

<div id="shop" class="shop hidden"></div>

</div>

<script>

const VERSION="1.0.0"

let level=localStorage.getItem("level")||1
let points=localStorage.getItem("points")||0

document.getElementById("level").innerText=level
document.getElementById("points").innerText=points

let num1,num2

function newExercise(){

num1=Math.floor(Math.random()*10)
num2=Math.floor(Math.random()*10)

document.getElementById("exercise").innerText=num1+" + "+num2
document.getElementById("answer").value=""

}

newExercise()

function checkAnswer(){

let ans=document.getElementById("answer").value
let correct=num1+num2

let btn=document.getElementById("checkBtn")

if(ans==correct){

btn.className="green"
points++

if(points%5==0){
level++
}

saveGame()

setTimeout(()=>{
btn.className="blue"
newExercise()
},500)

}else{

btn.className="red"

let input=document.getElementById("answer")
input.classList.add("shake")

setTimeout(()=>{
input.classList.remove("shake")
btn.className="blue"
},500)

}

updateStats()

}

function updateStats(){

document.getElementById("level").innerText=level
document.getElementById("points").innerText=points

}

function saveGame(){

localStorage.setItem("level",level)
localStorage.setItem("points",points)

}

function openShop(){

let shop=document.getElementById("shop")
shop.classList.toggle("hidden")

shop.innerHTML=""

let gifts=[
{icon:"🍫",price:10},
{icon:"🎮",price:20},
{icon:"🚗",price:30}
]

gifts.forEach(g=>{

let div=document.createElement("div")
div.className="gift"

div.innerHTML="<span>"+g.icon+"</span>"+g.price+" נקודות"

shop.appendChild(div)

})

}

function parentPanel(){

let icon=prompt("אייקון מתנה")

let price=prompt("מחיר")

if(!icon||!price)return

let shop=document.getElementById("shop")

let div=document.createElement("div")
div.className="gift"

div.innerHTML="<span>"+icon+"</span>"+price+" נקודות"

shop.appendChild(div)

}

function checkUpdate(){

alert("אין גרסה חדשה כרגע")

location.reload()

}

</script>

</body>
</html>
