<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;text-align:center;}
header{display:flex;flex-direction:column;align-items:center;}
#bottomBar{background:#27ae60;color:white;padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;}
#bottomBar .title{font-size:28px;font-weight:bold;}
#bottomBar img{height:160px;margin-top:5px;}
.bar{display:flex;justify-content:center;gap:10px;margin:10px;}
button{padding:10px 14px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
#startScreen button{background:#3498db;color:white;}
#gameScreen button{background:#2ecc71;color:white;}
.stats{display:none;background:#e8f8ff;padding:8px;justify-content:center;gap:20px;font-weight:bold;}
.game{display:none;padding:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:400px;margin:auto;}
.question{background:white;padding:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
input{width:60px;font-size:18px;text-align:center;}
.correct{background:#c8f7c5;}
.wrong{background:#ffcccc;animation:shake .3s;}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)}}
#shop{display:none;background:white;padding:10px;margin:10px;border-radius:10px;}
.shopgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.item{border:1px solid #ccc;padding:10px;border-radius:8px;}
.buy-green{background:#2ecc71;color:white;}
.buy-red{background:#e74c3c;color:white;}
.message{margin-top:10px;font-weight:bold;color:#2c3e50;}
footer{margin-top:20px;font-size:12px;color:#555;}
</style>
</head>
<body>

<div id="startScreen">
<header>
<div id="bottomBar">
<div class="title">Math City</div>
<img src="logo.png" alt="Logo">
</div>
</header>
<div class="bar">
<button onclick="startGame()">התחל משחק</button>
<button onclick="resetGame()">♻️ איפוס</button>
<button onclick="checkUpdate()">🔄 עדכון גרסה</button>
</div>
</div>

<div id="gameScreen">
<header>
<div id="bottomBar">
<div class="title">Math City</div>
<img src="logo.png" alt="Logo">
</div>
</header>

<div class="stats" id="stats">
<span>⭐ רמה: <span id="level"></span></span>
<span>🎯 נקודות: <span id="points"></span></span>
<span>🪙 כסף: <span id="coins"></span></span>
</div>

<div class="game">
<div class="grid" id="questions"></div>
<button onclick="checkAnswers()">בדיקה</button>
<div class="message" id="msg"></div>
<div class="bar">
<button onclick="toggleShop()">🛒 חנות</button>
<button onclick="showStats()">📊 סטטיסטיקה</button>
<button onclick="spinReward()">🎡 פרס</button>
<button onclick="dailyReward()">🎁 מתנה יומית</button>
<button onclick="checkUpdate()">🔄 עדכון</button>
<button onclick="resetGame()">♻️ איפוס</button>
<button onclick="installApp()">📲 התקן אפליקציה</button>
</div>
</div>

<div id="shop">
<h3>חנות</h3>
<button onclick="toggleParentMode()">👨‍👩‍👧 מצב הורים</button>
<button onclick="addItem()">➕ הוסף פריט</button>
<div class="shopgrid" id="shopItems"></div>
</div>

<footer>
&copy; 2026 אלכסיי זבודיסקר - גרסה 1.0.3
</footer>

<script>
// אייקונים
const icons=["🍦","🍕","🍔","🍩","🍭","⚽","🎮","🚗","🧸","🎧","📱","🎲","🎁","🛴","🏀"];
let parentMode=false;

// נתוני משחק
let data = JSON.parse(localStorage.getItem("mathcity")) || {
points:0, coins:0, level:1, correct:0, lastGift:0,
items:[
{name:"🍦 גלידה",price:10},{name:"⚽ כדור",price:15},{name:"🎮 משחק",price:20},
{name:"🍕 פיצה",price:12},{name:"🚗 צעצוע",price:18},{name:"🎧 אוזניות",price:25},
{name:"📱 טלפון",price:40},{name:"🎲 קוביות",price:8},{name:"🎁 הפתעה",price:30}
]
};

function save(){localStorage.setItem("mathcity",JSON.stringify(data));}
function updateStats(){level.innerText=data.level;points.innerText=data.points;coins.innerText=data.coins;}
function startGame(){document.getElementById("startScreen").style.display="none";document.getElementById("gameScreen").style.display="block";updateStats();newQuestions();document.getElementById("stats").style.display="flex";}

// שאלות
function newQuestions(){
const questions=document.getElementById("questions");
questions.innerHTML="";
for(let i=0;i<4;i++){
let a=Math.floor(Math.random()*10);
let b=Math.floor(Math.random()*10);
let div=document.createElement("div");
div.className="question";
div.innerHTML=`${a}+${b}=<input data-answer="${a+b}">`;
questions.appendChild(div);
}
}

function checkAnswers(){
const inputs=document.querySelectorAll("#questions input");
let allFilled=true;
inputs.forEach(input=>{if(input.value==="")allFilled=false;});
if(!allFilled){msg.innerText="נא למלא את כל התשובות!";return;}
let correctCount=0;
inputs.forEach(input=>{
let ans=parseInt(input.value);let real=parseInt(input.dataset.answer);
if(ans===real){input.parentElement.classList.remove("wrong");input.parentElement.classList.add("correct");correctCount++;}else{
input.parentElement.classList.add("wrong");
setTimeout(()=>input.parentElement.classList.remove("wrong"),500);
}
});
data.points+=correctCount;
data.coins+=correctCount;
data.correct+=correctCount;
if(data.points>=data.level*10)data.level++;
msg.innerText="תשובות נכונות: "+correctCount;
if(data.correct>=10){spinReward();data.correct=0;}
save();updateStats();
}

// חנות
function toggleShop(){shop.style.display=shop.style.display=="block"?"none":"block";renderShop();}
function toggleParentMode(){parentMode=!parentMode;renderShop();}
function renderShop(){
const shopItems=document.getElementById("shopItems");
shopItems.innerHTML="";
data.items.forEach((item,i)=>{
let canBuy=data.coins>=item.price;
let div=document.createElement("div");div.className="item";
div.innerHTML=`<div>${item.name}</div><div>${item.price}🪙</div><button class="${canBuy?'buy-green':'buy-red'}" onclick="buy(${i})">קנה</button>`;
if(parentMode){let iconOptions="";icons.forEach((ic,j)=>iconOptions+=`${j+1}:${ic} `);div.innerHTML+=`<button onclick="editItem(${i})">✏️</button><button onclick="deleteItem(${i})">🗑</button>`;}
shopItems.appendChild(div);
});
}

function buy(i){let item=data.items[i];if(data.coins<item.price)return;data.coins-=item.price;msg.innerText="קנית "+item.name;save();updateStats();renderShop();}
function addItem(){if(!parentMode)return;let name=prompt("שם מתנה");if(!name)return;let price=parseInt(prompt("מחיר"));let icon=parseInt(prompt("בחר מספר אייקון 1-15"));icon=icons[icon-1]||"🎁";data.items.push({name:icon+" "+name,price:price});save();renderShop();}
function editItem(i){let item=data.items[i];let name=prompt("שם חדש",item.name);let price=prompt("מחיר חדש",item.price);item.name=name;item.price=parseInt(price);save();renderShop();}
function deleteItem(i){if(!confirm("למחוק?"))return;data.items.splice(i,1);save();renderShop();}

// גלגל מזל
function spinReward(){let prizes=[5,10,15,20];let prize=prizes[Math.floor(Math.random()*prizes.length)];data.coins+=prize;msg.innerText="🎡 זכית ב "+prize+" מטבעות!";save();updateStats();}

// מתנה יומית
function dailyReward(){let now=Date.now();if(now-data.lastGift<28800000){msg.innerText="⏳ המתנה כבר נלקחה";return;}let prize=50;data.coins+=prize;data.lastGift=now;msg.innerText="🎁 מתנה יומית "+prize+" מטבעות!";save();updateStats();}

// סטטיסטיקה
function showStats(){alert("רמה: "+data.level+"\nנקודות: "+data.points+"\nכסף: "+data.coins+"\nתרגילים נכונים: "+data.correct);}

// עדכון
function checkUpdate(){location.reload();}

// איפוס
function resetGame(){if(confirm("לאפס הכל?")){localStorage.removeItem("mathcity");location.reload();}}

// התקנת אפליקציה
let installPrompt;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();installPrompt=e;});
function installApp(){if(!installPrompt)return;installPrompt.prompt();}
</script>

</body>
</html>
