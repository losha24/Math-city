<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Math City</h1>

</header>

<div id="menu">

<button onclick="startGame()">🎮 התחל משחק</button>

<button onclick="resetGame()">♻️ איפוס</button>

<button onclick="checkUpdate()">⬆️ עדכון גרסה</button>

<button id="installBtn">📲 התקן אפליקציה</button>

</div>

<div id="game" class="hidden">

<div id="stats">

רמה: <span id="level">1</span>

נקודות: <span id="points">0</span>

מטבעות: <span id="coins">0</span>

</div>

<div id="mathBox">

<div class="row">

<input id="q1" readonly>

<input id="a1">

<input id="q2" readonly>

<input id="a2">

</div>

<div class="row">

<input id="q3" readonly>

<input id="a3">

<input id="q4" readonly>

<input id="a4">

</div>

<button onclick="checkAnswers()">בדוק תשובות</button>

</div>

<div class="buttons">

<button onclick="openShop()">🛒 חנות</button>

<button onclick="dailyGift()">🎁 מתנה יומית</button>

<button onclick="spinWheel()">🎯 גלגל מזל</button>

<button onclick="showStats()">📊 סטטיסטיקה</button>

<button onclick="checkUpdate()">⬆️ עדכון</button>

<button onclick="resetGame()">♻️ איפוס</button>

</div>

<div id="shop" class="hidden"></div>

<div id="statsBox" class="hidden"></div>

</div>

<footer>

© אלכסיי זבודיסקר

</footer>

<script src="game.js"></script>

</body>
</html>
