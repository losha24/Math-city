<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
    <header>
        <img src="logo.png" class="logo">
        <h1>Math City</h1>
    </header>
    <div class="startButtons">
        <button onclick="startGame()">🎮 התחל משחק</button>
        <button onclick="resetGame()">♻️ איפוס</button>
        <button onclick="updateVersion()">⬆️ עדכון גרסא</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <header>
        <img src="logo.png" class="logo-small">
        <div class="status-bar">
            רמה: <span id="level">1</span> | 
            ⭐ נקודות: <span id="score">0</span> | 
            🪙 מטבעות: <span id="coins">0</span>
        </div>
    </header>

    <!-- City / בניינים -->
    <div id="city" class="city"></div>

    <!-- תרגילים -->
    <div id="exercises">
        <div class="exercise">
            <h3 id="question1"></h3>
            <input id="answer1" class="answer">
        </div>
        <div class="exercise">
            <h3 id="question2"></h3>
            <input id="answer2" class="answer">
        </div>
        <div class="exercise">
            <h3 id="question3"></h3>
            <input id="answer3" class="answer">
        </div>
        <div class="exercise">
            <h3 id="question4"></h3>
            <input id="answer4" class="answer">
        </div>
    </div>

    <button id="checkAll" onclick="checkAllAnswers()">בדוק את כולם</button>

    <div class="gameButtons">
        <button onclick="openShop()">🏪 חנות</button>
        <button onclick="openRewards()">🏆 פרסים</button>
        <button onclick="openStats()">📊 סטטיסטיקות</button>
        <button onclick="spinWheel()">🎡 גלגל מזל</button>
        <button onclick="installApp()">📲 התקנת אפליקציה</button>
        <button onclick="updateVersion()">⬆️ עדכון גרסא</button>
        <button onclick="resetGame()">♻️ איפוס</button>
    </div>

    <div id="rewardBox"></div>
</div>

<!-- SHOP SCREEN -->
<div id="shopScreen" class="screen">
    <h2>🏪 חנות</h2>
    <button onclick="toggleParentMode()">👨‍👩‍👧 מצב הורים</button>
    <div id="shopList"></div>
    <div id="parentControls" class="parentControls hidden">
        <input id="newItemName" placeholder="שם פריט">
        <input id="newItemPrice" placeholder="מחיר">
        <select id="newItemIcon"></select>
        <button onclick="addShopItem()">הוסף פריט</button>
    </div>
    <button onclick="backGame()">⬅ חזרה</button>
</div>

<!-- REWARDS SCREEN -->
<div id="rewardsScreen" class="screen">
    <h2>🏆 פרסים</h2>
    <div id="rewardList"></div>
    <button onclick="backGame()">⬅ חזרה</button>
</div>

<!-- STATS SCREEN -->
<div id="statsScreen" class="screen">
    <h2>📊 סטטיסטיקות</h2>
    <div id="statsBox"></div>
    <button onclick="backGame()">⬅ חזרה</button>
</div>

<footer>
© 2026 אלכסיי זבודיסקר | גרסא 6.1
</footer>

<script src="game.js"></script>
</body>
</html>
