<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math City – גרסה 5</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
<h1>Math City</h1>
<img src="logo.png" class="logo"><br><br>
<div class="bar-buttons">
<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="resetGame()">♻️ איפוס</button>
<button onclick="checkUpdate()">⬆ עדכון גרסא</button>
</div>
<br>
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
<header>
<h2>Math City</h2>
<img src="logo.png" class="logo">
</header>
<h3>
רמה: <span id="level">1</span> ⭐ נקודות: <span id="score">0</span> 🪙 מטבעות: <span id="coins">0</span>
</h3>

<div id="monster" class="monster"></div>
<div id="rewardBox"></div>
<h2 id="question"></h2>
<input id="answer"><br>
<button onclick="check()">בדוק</button>

<div class="city" id="city"></div>

<div class="bar-buttons">
<button onclick="openRewards()">🏆 פרסים</button>
<button onclick="openShop()">🏪 חנות</button>
<button onclick="openStats()">📊 סטטיסטיקות</button>
<button onclick="checkUpdate()">⬆ עדכון גרסא</button>
<button onclick="installApp()">📲 התקנת אפליקציה</button>
</div>
</div>

<!-- SHOP SCREEN -->
<div id="shopScreen" class="screen">
<h2>🏪 חנות</h2>
<div id="shopList"></div>
<div class="bar-buttons">
<button onclick="backGame()">⬅ חזרה</button>
</div>
</div>

<!-- REWARDS SCREEN -->
<div id="rewardsScreen" class="screen">
<h2>🏆 הפרסים</h2>
<div id="rewardList"></div>
<div class="bar-buttons">
<button onclick="backGame()">⬅ חזרה</button>
</div>
</div>

<!-- STATS SCREEN -->
<div id="statsScreen" class="screen">
<h2>📊 סטטיסטיקות</h2>
<div id="statsBox"></div>
<div class="bar-buttons">
<button onclick="backGame()">⬅ חזרה</button>
</div>
</div>

<footer>
© 2026 אלכסיי זבודיסקר <br>
גרסה נוכחית: 5
</footer>

<script src="game.js"></script>
</body>
</html>
