<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math City</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="startScreen">

<div class="logoTitle">

<img src="logo.png" class="logo">

<h1>Math City</h1>

</div>

<div class="startButtons">

<button onclick="startGame()">▶️ התחל משחק</button>

<button onclick="resetGame()">🔄 איפוס</button>

<button onclick="checkUpdate()">⬆️ עדכון גרסה</button>

<button id="installBtn">📲 התקן אפליקציה</button>

</div>

</div>


<div id="gameScreen">

<header>

<div class="logoTitle">

<img src="logo.png" class="logo">

<h1>Math City</h1>

</div>

</header>


<div class="statusBar">

רמה <span id="level">1</span>

נקודות <span id="score">0</span>

מטבעות <span id="coins">0</span>

</div>


<div class="buttonsBar">

<button onclick="spinWheel()">🎁 גלגל מזל</button>

<button onclick="dailyReward()">🎁 מתנה יומית</button>

<button onclick="toggleShop()">🛒 חנות</button>

<button onclick="checkUpdate()">⬆️ עדכון</button>

</div>


<div class="city" id="city"></div>


<div class="questions">

<div class="qBox">

<span id="q1"></span>

<input id="a1">

</div>

<div class="qBox">

<span id="q2"></span>

<input id="a2">

</div>

<div class="qBox">

<span id="q3"></span>

<input id="a3">

</div>

<div class="qBox">

<span id="q4"></span>

<input id="a4">

</div>

</div>


<button class="checkBtn" onclick="checkAnswers()">

בדוק תשובות

</button>


<div id="shop">

<h2>חנות</h2>

<div id="shopItems"></div>

</div>

</div>


<footer>

© Math City  
Alexsei Zavodisker

</footer>


<script src="game.js"></script>

</body>
</html>
