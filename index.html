<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="startScreen" class="screen active">

<img src="logo.png" class="logo">

<h1>Math City</h1>

<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="resetGame()">♻ איפוס</button>
<button onclick="checkUpdate()">⬆ עדכון</button>

</div>


<div id="gameScreen" class="screen">

<header>

<img src="logo.png" class="logoSmall">

<h2>Math City</h2>

</header>


<div class="topBar">

<div>רמה <span id="levelText">1</span></div>
<div>⭐ נקודות <span id="scoreText">0</span></div>
<div>🪙 כסף <span id="coinsText">0</span></div>

</div>


<div class="buttonBar">

<button onclick="openShop()">🏪 חנות</button>
<button onclick="spinWheel()">🎰 גלגל מזל</button>
<button onclick="checkUpdate()">⬆ עדכון</button>
<button onclick="resetGame()">♻ איפוס</button>

</div>


<div class="questionGrid">

<div class="qBox"><span id="q1"></span><input id="a1"></div>
<div class="qBox"><span id="q2"></span><input id="a2"></div>
<div class="qBox"><span id="q3"></span><input id="a3"></div>
<div class="qBox"><span id="q4"></span><input id="a4"></div>

</div>

<button onclick="checkAll()">בדוק הכל</button>


<div id="city" class="city"></div>

<div id="rewardPopup"></div>

</div>


<div id="shopScreen" class="screen">

<h2>🏪 חנות</h2>

<button onclick="openParent()">🔒 מצב הורים</button>

<div id="shopList" class="shopGrid"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>


<div id="parentPanel" class="screen">

<h2>ניהול חנות</h2>

שם פריט
<input id="itemName">

מחיר
<input id="itemPrice">

אייקון
<select id="itemIcon">

<option>🚗</option>
<option>🌳</option>
<option>🏠</option>
<option>🏪</option>
<option>🏫</option>
<option>🎡</option>
<option>🏰</option>
<option>🗼</option>
<option>🎢</option>
<option>🚀</option>

</select>

<button onclick="addItem()">➕ הוסף פריט</button>

<button onclick="backShop()">⬅ חזרה</button>

</div>


<footer>

© 2026 אלכסיי זבודיסקר | גרסה 5.3

</footer>

<script src="game.js"></script>

</body>
</html>
