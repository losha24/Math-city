<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Math City</h1>

</header>

<div id="startScreen">

<button onclick="startGame()">▶️ התחל משחק</button>

<button onclick="resetGame()">🔄 איפוס</button>

<button onclick="checkUpdate()">⬆️ עדכון גרסה</button>

<button id="installBtn">📲 התקן אפליקציה</button>

</div>

<div id="game" class="hidden">

<div class="stats">

<span>רמה: <b id="level">1</b></span>

<span>נקודות: <b id="points">0</b></span>

<span>מטבעות: <b id="coins">0</b></span>

</div>

<div class="tasks">

<div class="task"><span id="q1"></span><input id="a1"></div>

<div class="task"><span id="q2"></span><input id="a2"></div>

<div class="task"><span id="q3"></span><input id="a3"></div>

<div class="task"><span id="q4"></span><input id="a4"></div>

</div>

<button class="checkBtn" onclick="checkAnswers()">בדוק תשובות</button>

<div class="bar">

<button onclick="openShop()">🛒 חנות</button>

<button onclick="dailyReward()">🎁 מתנה</button>

<button onclick="spinReward()">🎯 פרס</button>

<button onclick="showStats()">📊 סטטיסטיקה</button>

</div>

</div>

<div id="shop" class="hidden"></div>

<footer>

© אלכסיי זבודיסקר

</footer>

<script src="game.js"></script>

</body>

</html>
