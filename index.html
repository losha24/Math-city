<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logoBox">

<img src="logo.png" class="logo">

<h1>Math City</h1>

</div>

</header>


<div class="statusBar">

רמה: <span id="level">1</span>

נקודות: <span id="score">0</span>

כסף: <span id="coins">0</span>

</div>


<div class="buttons">

<button onclick="spinWheel()">🎡 גלגל מזל</button>

<button onclick="dailyReward()">🎁 מתנה יומית</button>

</div>


<div id="game">

<div class="city" id="city"></div>


<div class="questions">

<div class="qBox">
<span id="q1"></span>
<input id="a1">
</div>

<div class="qBox">
<span id="q2"></span>
<input id="a2">
</div>

<div class="qBox">
<span id="q3"></span>
<input id="a3">
</div>

<div class="qBox">
<span id="q4"></span>
<input id="a4">
</div>

</div>


<button onclick="checkAnswers()" class="checkBtn">

בדוק תשובות

</button>


</div>


<div id="shop">

<h2>חנות</h2>

<div id="shopItems"></div>

</div>


<footer>

© Math City 2026

</footer>


<script src="game.js"></script>

</body>
</html>
