<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">

</head>

<body>

<div id="startScreen">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<button onclick="startGame()">🎮 התחל משחק</button>
<button onclick="openPrizes()">🎁 פרסים</button>

</div>

<div id="game" class="hidden">

<header>

<div class="coinsBox">
🪙 <span id="coins">0</span>
</div>

<div>

<button onclick="openShop()">🛒 חנות</button>
<button onclick="openPrizes()">🎁 פרסים</button>
<button onclick="refreshGame()">🔄 רענן</button>
<button id="installBtn" class="hidden">📲 התקן אפליקציה</button>

</div>

</header>

<div class="questionBox">

<h2 id="question"></h2>

<input id="answer">

<button onclick="checkAnswer()">בדוק</button>

<p id="result"></p>

</div>

<div id="monster"></div>

</div>

<div id="shop" class="hidden">

<h2>🛒 חנות</h2>

<div>
מטבעות: <span id="shopCoins"></span>
</div>

<div id="shopItems" class="shopGrid"></div>

<button onclick="openAdmin()">⚙ ניהול חנות</button>
<button onclick="closeShop()">סגור</button>

</div>

<div id="admin" class="hidden">

<h2>ניהול חנות</h2>

<input id="itemName" placeholder="שם">

<input id="itemPrice" type="number" placeholder="מחיר">

<input id="itemIcon" placeholder="אייקון">

<button onclick="addItem()">הוסף</button>

<div id="adminList"></div>

<button onclick="closeAdmin()">סגור</button>

</div>

<div id="prizes" class="hidden">

<h2>🎁 פרסים</h2>

<ul id="prizeList"></ul>

<button onclick="closePrizes()">סגור</button>

</div>

<footer>

© אלכסיי זבודיסקר

</footer>

<script>

let coins=0
let correctCount=0
let tries=0
let a=0
let b=0
let op="+"

let prizes=[]

let shopItems=[
{name:"בית",price:20,icon:"🏠"},
{name:"עץ",price:10,icon:"🌳"},
{name:"פארק",price:25,icon:"🏞"},
{name:"כביש",price:15,icon:"🛣"},
{name:"מגדל",price:30,icon:"🏢"},
{name:"תחנה",price:20,icon:"🚏"}
]

function save(){

localStorage.setItem("coins",coins)
localStorage.setItem("correctCount",correctCount)
localStorage.setItem("prizes",JSON.stringify(prizes))
localStorage.setItem("shop",JSON.stringify(shopItems))
localStorage.setItem("screen","game")

}

function load(){

coins=parseInt(localStorage.getItem("coins"))||0
correctCount=parseInt(localStorage.getItem("correctCount"))||0
prizes=JSON.parse(localStorage.getItem("prizes")||"[]")

let s=localStorage.getItem("shop")
if(s)shopItems=JSON.parse(s)

updateCoins()

let screen=localStorage.getItem("screen")

if(screen==="game"){

document.getElementById("startScreen").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

newQuestion()

}

}

function startGame(){

document.getElementById("startScreen").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

save()

newQuestion()

}

function refreshGame(){

location.reload()

}

function newQuestion(){

tries=0

let type=Math.random()

if(type<0.5){

op="+"
a=Math.floor(Math.random()*10)
b=Math.floor(Math.random()*10)

}else{

op="-"
a=Math.floor(Math.random()*10)+5
b=Math.floor(Math.random()*5)

}

document.getElementById("question").innerText=a+" "+op+" "+b

document.getElementById("answer").value=""

}

function checkAnswer(){

let ans=parseInt(document.getElementById("answer").value)

let correct=op=="+"?a+b:a-b

if(ans===correct){

document.getElementById("result").style.color="green"
document.getElementById("result").innerText="נכון!"

coins+=5
correctCount++

if(correctCount%10===0){

let p="🎁 פרס "+(prizes.length+1)
prizes.push(p)

alert("קיבלת פרס!")

}

spawnMonster()

updateCoins()

save()

setTimeout(newQuestion,1000)

}else{

tries++

if(tries===1){

document.getElementById("result").style.color="red"
document.getElementById("result").innerText="נסה שוב"

}else{

document.getElementById("result").innerText="טעות"

setTimeout(newQuestion,1000)

}

}

}

function spawnMonster(){

if(Math.random()<0.3){

let m=document.getElementById("monster")

m.innerText="👾 מפלצת תקפה!"

setTimeout(()=>{

m.innerText=""

},2000)

}

}

function updateCoins(){

document.getElementById("coins").innerText=coins

}

function openShop(){

document.getElementById("shop").classList.remove("hidden")

document.getElementById("shopCoins").innerText=coins

renderShop()

}

function closeShop(){

document.getElementById("shop").classList.add("hidden")

}

function renderShop(){

let s=document.getElementById("shopItems")

s.innerHTML=""

shopItems.forEach((item,i)=>{

let d=document.createElement("div")

d.className="shopItem"

d.innerHTML=

item.icon+"<br>"+
item.name+"<br>"+
item.price+"<br>"+
"<button onclick='buyItem("+i+")'>קנה</button>"

s.appendChild(d)

})

}

function buyItem(i){

let item=shopItems[i]

if(coins>=item.price){

coins-=item.price
updateCoins()
save()

}

}

function openPrizes(){

document.getElementById("prizes").classList.remove("hidden")

let list=document.getElementById("prizeList")

list.innerHTML=""

prizes.forEach(p=>{

let li=document.createElement("li")
li.innerText=p
list.appendChild(li)

})

}

function closePrizes(){

document.getElementById("prizes").classList.add("hidden")

}

function openAdmin(){

document.getElementById("admin").classList.remove("hidden")

renderAdmin()

}

function closeAdmin(){

document.getElementById("admin").classList.add("hidden")

}

function renderAdmin(){

let a=document.getElementById("adminList")

a.innerHTML=""

shopItems.forEach((item,i)=>{

let d=document.createElement("div")

d.innerHTML=item.icon+" "+item.name+" "+item.price+
"<button onclick='deleteItem("+i+")'>❌</button>"

a.appendChild(d)

})

}

function addItem(){

let name=document.getElementById("itemName").value
let price=parseInt(document.getElementById("itemPrice").value)
let icon=document.getElementById("itemIcon").value

shopItems.push({name,price,icon})

save()

renderAdmin()
renderShop()

}

function deleteItem(i){

shopItems.splice(i,1)

save()

renderAdmin()
renderShop()

}

/* install app */

let deferredPrompt

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").classList.remove("hidden")

})

document.getElementById("installBtn").addEventListener("click",()=>{

deferredPrompt.prompt()

})

load()

</script>

</body>
</html>
