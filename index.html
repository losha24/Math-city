<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Math City</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#eef5ff;
text-align:center;
margin:0;
}

header{
background:#4CAF50;
color:white;
padding:15px;
}

.logo{
width:180px;
}

.screen{
display:none;
}

.active{
display:block;
}

.city{
display:grid;
grid-template-columns:repeat(5,60px);
gap:8px;
justify-content:center;
margin:20px;
font-size:30px;
}

button{
padding:12px;
margin:6px;
font-size:16px;
border-radius:8px;
border:none;
background:#2196F3;
color:white;
}

.shopItem{
background:white;
border-radius:10px;
padding:10px;
margin:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.correct{
background:#b8f5b8;
border:2px solid green;
}

.wrong{
background:#ffb3b3;
border:2px solid red;
}

.reward{
background:linear-gradient(45deg,#ffeb3b,#ff9800);
padding:10px;
border-radius:10px;
margin:10px;
}

.monster{
font-size:35px;
}

footer{
margin-top:30px;
padding:10px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<!-- START -->

<div id="startScreen" class="screen active">

<h1>Math City</h1>

<img src="logo.png" class="logo">

<br><br>

<button onclick="startGame()">🎮 התחל משחק</button>

<br>

<button onclick="openRewards()">🏆 פרסים</button>

<button onclick="openShop()">🏪 חנות</button>

<button onclick="openStats()">📊 סטטיסטיקות</button>

</div>

<!-- GAME -->

<div id="gameScreen" class="screen">

<header>

<h2>Math City</h2>

<img src="logo.png" class="logo">

</header>

<h3>

רמה: <span id="level">1</span>  
⭐ נקודות: <span id="score">0</span>  
🪙 מטבעות: <span id="coins">0</span>

</h3>

<div id="monster" class="monster"></div>

<div id="rewardBox"></div>

<h2 id="question"></h2>

<input id="answer">

<br><br>

<button onclick="check()">בדוק</button>

<div class="city" id="city"></div>

<br>

<button onclick="openRewards()">🏆 פרסים</button>

<button onclick="openShop()">🏪 חנות</button>

<button onclick="openStats()">📊 סטטיסטיקות</button>

<button onclick="resetGame()">♻️ איפוס</button>

</div>

<!-- SHOP -->

<div id="shopScreen" class="screen">

<h2>🏪 חנות</h2>

<div id="shopList"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<!-- REWARDS -->

<div id="rewardsScreen" class="screen">

<h2>🏆 הפרסים</h2>

<div id="rewardList"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<!-- STATS -->

<div id="statsScreen" class="screen">

<h2>📊 סטטיסטיקות</h2>

<div id="statsBox"></div>

<button onclick="backGame()">⬅ חזרה</button>

</div>

<footer>

© 2026 אלכסיי זבודיסקר

</footer>

<script>

let level=1
let score=0
let coins=0
let attempts=0
let correct=0

let solved=0
let mistakes=0

let rewards=[]
let trophies=[]

let buildings=["🏠","🌳","🏪","🏫","🎡","🏢"]

let monsters=["👾","👻","🤖","🦖"]

let monsterActive=false

let shopItems=[
{name:"🚗 מכונית",price:50,icon:"🚗"},
{name:"🌳 עץ מיוחד",price:40,icon:"🌳"},
{name:"🏠 בית גדול",price:80,icon:"🏠"},
{name:"🏪 קניון",price:120,icon:"🏪"},
{name:"🏫 בית ספר",price:150,icon:"🏫"},
{name:"🎡 לונה פארק",price:200,icon:"🎡"},
{name:"🏰 טירה",price:300,icon:"🏰"},
{name:"🗼 מגדל",price:400,icon:"🗼"},
{name:"🎢 רכבת הרים",price:500,icon:"🎢"},
{name:"🚀 חללית",price:700,icon:"🚀"}
]

function showScreen(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function startGame(){

showScreen("gameScreen")

}

function backGame(){

showScreen("gameScreen")

}

function openShop(){

renderShop()

showScreen("shopScreen")

}

function openRewards(){

updateRewardList()

showScreen("rewardsScreen")

}

function openStats(){

renderStats()

showScreen("statsScreen")

}

function newQuestion(){

answer.classList.remove("correct","wrong")

attempts=0

let a,b

if(level<3){

a=Math.floor(Math.random()*10)

b=Math.floor(Math.random()*10)

correct=a+b

question.innerText=a+" + "+b

}else{

a=Math.floor(Math.random()*10)

b=Math.floor(Math.random()*a)

correct=a-b

question.innerText=a+" - "+b

}

}

function spawnMonster(){

monster.innerText=monsters[Math.floor(Math.random()*monsters.length)]

monsterActive=true

}

function destroyBuilding(){

let c=city.children

if(c.length>0){

city.removeChild(c[Math.floor(Math.random()*c.length)])

}

}

function check(){

let val=parseInt(answer.value)

if(isNaN(val)) return

if(val==correct){

answer.classList.add("correct")

score++

solved++

coins+=5

if(monsterActive){

monster.innerText=""

monsterActive=false

}else{

build()

}

if(score%10==0){

coins+=20

giveReward()

}

if(score%5==0){

level++

spawnMonster()

destroyBuilding()

}

updateUI()

setTimeout(()=>{

answer.value=""

newQuestion()

},500)

save()

}else{

attempts++

mistakes++

answer.classList.add("wrong")

if(attempts>=2){

setTimeout(()=>{

answer.value=""

newQuestion()

answer.classList.remove("wrong")

},700)

}

}

}

function build(){

let el=document.createElement("div")

el.innerText=buildings[Math.floor(Math.random()*buildings.length)]

city.appendChild(el)

}

function giveReward(){

let icons=["🚗","🎡","🏰","🗼","🎢"]

let r=icons[Math.floor(Math.random()*icons.length)]

rewards.push(r)

rewardBox.innerHTML='<div class="reward">🎁 פרס חדש '+r+'</div>'

setTimeout(()=>{

rewardBox.innerHTML=""

},3000)

}

function renderShop(){

shopList.innerHTML=""

shopItems.forEach(item=>{

shopList.innerHTML+=`

<div class="shopItem">

<h3>${item.icon} ${item.name}</h3>

מחיר: ${item.price} 🪙

<br><br>

<button onclick="buyItem('${item.icon}',${item.price})">קנה</button>

</div>

`

})

}

function buyItem(icon,price){

if(coins<price){

alert("אין מספיק מטבעות")

return

}

coins-=price

let el=document.createElement("div")

el.innerText=icon

city.appendChild(el)

updateUI()

save()

}

function updateRewardList(){

rewardList.innerHTML=rewards.join(" ")

}

function renderStats(){

let accuracy=solved==0?0:Math.round((solved/(solved+mistakes))*100)

statsBox.innerHTML=

`

תרגילים שנפתרו: ${solved}<br>

טעויות: ${mistakes}<br>

אחוז הצלחה: ${accuracy}%<br>

מטבעות: ${coins}

`

}

function updateUI(){

scoreEl.innerText=score

levelEl.innerText=level

coinsEl.innerText=coins

}

function save(){

localStorage.setItem("mathCity",

JSON.stringify({

score,level,coins,

city:city.innerHTML,

rewards,solved,mistakes

}))

}

function load(){

let data=localStorage.getItem("mathCity")

if(data){

let d=JSON.parse(data)

score=d.score||0
level=d.level||1
coins=d.coins||0
rewards=d.rewards||[]
solved=d.solved||0
mistakes=d.mistakes||0

city.innerHTML=d.city||""

}

updateUI()

}

function resetGame(){

localStorage.clear()

location.reload()

}

let scoreEl=document.getElementById("score")
let levelEl=document.getElementById("level")
let coinsEl=document.getElementById("coins")

load()

newQuestion()

</script>

</body>
</html>
